<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <link rel="manifest" href="manifest.json" />
  <script>if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");</script>
  <title>Ian's 철인계산기2</title>
  <link rel="icon" href="icon-1024-blue.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// ============================================================
// localStorage 유틸
// ============================================================
const LS = {
  get: (key, fallback = {}) => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch { return fallback; }
  },
  set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
};

const ZONE_LABELS = ["Recovery", "Endurance", "Tempo", "Sweet Spot", "Threshold", "VO₂max"];
const ZONE_COLORS = ["bg-blue-100 text-blue-800","bg-green-100 text-green-800","bg-yellow-100 text-yellow-800","bg-orange-100 text-orange-800","bg-red-100 text-red-800","bg-purple-100 text-purple-800"];

// ============================================================
// 공통 컴포넌트
// ============================================================
function Card({ children, className = "" }) {
  return <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 p-4 ${className}`}>{children}</div>;
}
function Label({ children }) {
  return <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">{children}</label>;
}
function Input({ value, onChange, placeholder, type = "number", min, max, step }) {
  return (
    <input type={type} value={value} onChange={e => onChange(e.target.value)}
      placeholder={placeholder} min={min} max={max} step={step}
      className="w-full px-3 py-2 text-sm border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-300 focus:bg-white transition" />
  );
}
function Select({ value, onChange, options }) {
  return (
    <select value={value} onChange={e => onChange(e.target.value)}
      className="w-full px-3 py-2 text-sm border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-300 focus:bg-white transition">
      {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  );
}
function CalcBtn({ onClick, children, color = "bg-blue-600 hover:bg-blue-700" }) {
  return (
    <button onClick={onClick} className={`w-full py-2.5 rounded-xl text-white font-bold text-sm ${color} transition active:scale-95`}>
      {children}
    </button>
  );
}
function ZoneRow({ zone, range, colorClass, intensity }) {
  return (
    <div className="flex items-center gap-2 py-1.5 border-b border-gray-50 last:border-0">
      <span className={`text-xs font-bold px-2 py-0.5 rounded-lg min-w-[52px] text-center ${colorClass}`}>{zone}</span>
      <span className="text-sm font-mono text-gray-800 flex-1">{range}</span>
      <span className="text-xs text-gray-500 text-right">{intensity}</span>
    </div>
  );
}
function BackBtn({ onBack }) {
  return (
    <button onClick={onBack} className="flex items-center justify-center w-9 h-9 rounded-xl text-gray-500 hover:text-gray-800 hover:bg-gray-100 mb-4 transition">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><rect y="3" width="20" height="2" rx="1"/><rect y="9" width="20" height="2" rx="1"/><rect y="15" width="20" height="2" rx="1"/></svg>
    </button>
  );
}
function SectionTitle({ emoji, title, color = "text-gray-800" }) {
  return <h2 className={`text-base font-bold ${color} flex items-center gap-2 mb-1`}><span>{emoji}</span>{title}</h2>;
}
function Desc({ children }) {
  return <p className="text-xs text-gray-400 mt-0.5 mb-4 leading-relaxed">{children}</p>;
}

// 시간 변환 유틸
function mmssToSec(str) {
  if (!str) return 0;
  const parts = str.split(":").map(Number);
  if (parts.length === 2) return (parts[0]||0)*60 + (parts[1]||0);
  if (parts.length === 3) return (parts[0]||0)*3600 + (parts[1]||0)*60 + (parts[2]||0);
  return parseFloat(str)*60 || 0;
}
function secToMMSS(sec) {
  const m = Math.floor(sec/60), s = Math.round(sec%60);
  return `${m}:${String(s).padStart(2,"0")}`;
}
function secToHMMSS(sec) {
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = Math.round(sec%60);
  if (h > 0) return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return `${m}:${String(s).padStart(2,"0")}`;
}

// ============================================================
// 1. 타이어 공기압
// ============================================================
function TirePressure({ onBack }) {
  return (
    <div>
      <BackBtn onBack={onBack} />
      <Card>
        <SectionTitle emoji="🚴🛞" title="타이어 공기압 계산기" color="text-emerald-700" />
        <Desc>SRAM AXS 공식 타이어 공기압 가이드 연동. 체중·타이어 폭·노면에 따른 최적 공기압을 제공합니다.</Desc>
        <p className="text-sm text-gray-600 mb-4">SRAM AXS 공식 타이어 공기압 계산기로 연결됩니다. 체중, 타이어 규격, 라이딩 환경에 따른 최적 공기압을 확인할 수 있습니다.</p>
        <div className="bg-emerald-50 rounded-xl p-4 mb-4 border border-emerald-100">
          <p className="text-xs text-emerald-700 font-semibold">🔗 외부 사이트 (SRAM AXS)</p>
          <p className="text-xs text-gray-500 mt-1 break-all">axs.sram.com/guides/tire/pressure</p>
        </div>
        <a href="https://axs.sram.com/guides/tire/pressure" target="_blank" rel="noopener noreferrer"
          className="block w-full py-3 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm text-center transition active:scale-95">
          공기압 계산기 열기 →
        </a>
      </Card>
    </div>
  );
}

// ============================================================
// 2. 심박존 계산기
// ============================================================
function HRZone({ onBack }) {
  const LSKEY = "calc_hrzone_";
  const saved = LS.get(LSKEY);
  const [sport, setSport] = useState(saved.sport ?? "bike");
  const [model, setModel] = useState(saved.model ?? "hrmax");
  const [hrMax, setHrMax] = useState(saved.hrMax ?? "");
  const [hrRest, setHrRest] = useState(saved.hrRest ?? "");
  const [result, setResult] = useState(null);

  useEffect(() => { LS.set(LSKEY, { sport, model, hrMax, hrRest }); }, [sport, model, hrMax, hrRest]);

  const ZONES = {
    run:  [ [0.50,0.60],[0.60,0.70],[0.70,0.80],[0.83,0.87],[0.80,0.90],[0.90,1.00] ],
    bike: [ [0.45,0.55],[0.55,0.65],[0.65,0.75],[0.78,0.82],[0.75,0.85],[0.85,0.95] ],
  };
  const KARVONEN_ZONES = {
    run:  [ [0.30,0.50],[0.50,0.65],[0.65,0.75],[0.78,0.84],[0.75,0.85],[0.85,1.00] ],
    bike: [ [0.25,0.45],[0.45,0.60],[0.60,0.70],[0.73,0.79],[0.70,0.80],[0.80,0.95] ],
  };

  const calculate = () => {
    const max = parseInt(hrMax), rest = parseInt(hrRest);
    if (!max || max < 100 || max > 230) { alert("HRmax를 올바르게 입력하세요 (100~230)"); return; }
    if (model === "karvonen" && (!rest || rest < 30 || rest > 100)) { alert("안정시 심박(HRrest)을 올바르게 입력하세요 (30~100)"); return; }
    const zones = model === "karvonen" ? KARVONEN_ZONES[sport] : ZONES[sport];
    const rows = zones.map((z, i) => {
      let lo, hi;
      if (model === "karvonen") { lo = Math.round(rest+(max-rest)*z[0]); hi = Math.round(rest+(max-rest)*z[1]); }
      else { lo = Math.round(max*z[0]); hi = Math.round(max*z[1]); }
      return { zone: ["Zone 1","Zone 2","Zone 3","SST","Zone 4","Zone 5"][i], lo, hi, label: ZONE_LABELS[i], color: ZONE_COLORS[i] };
    });
    setResult(rows);
  };

  return (
    <div><BackBtn onBack={onBack} />
      <Card>
        <SectionTitle emoji="🚴🏃❤️" title="심박존 계산기" />
<Desc>{`최대 심박수를 입력하여 종목별 훈련 심박존을 계산합니다.<br />
<b style="color:black;">· HRmax 모델 :</b> <span style="color:gray;">최대 심박수 수치만 활용하여 일반적인 운동 강도를 쉽고 빠르게 파악</span><br />
<b style="color:black;">· Karvonen 모델 :</b> <span style="color:gray;">안정시 심박수를 포함하여 개인의 숙련도와 체력 수준을 정밀하게 반영</span>`}</Desc>      

<div className="flex gap-2 mb-4">
          {["bike","run"].map(s => (
            <button key={s} onClick={() => setSport(s)}
              className={`flex-1 py-2 rounded-xl text-sm font-bold transition ${sport===s?"bg-red-500 text-white":"bg-gray-100 text-gray-500 hover:bg-gray-200"}`}>
              {s==="bike"?"🚴 사이클":"🏃 달리기"}
            </button>
          ))}
        </div>
        <div className="flex gap-2 mb-4">
          {[["hrmax","HRmax 모델"],["karvonen","Karvonen(HRR)"]].map(([v,l]) => (
            <button key={v} onClick={() => setModel(v)}
              className={`flex-1 py-1.5 rounded-xl text-xs font-bold transition ${model===v?"bg-blue-600 text-white":"bg-gray-100 text-gray-500 hover:bg-gray-200"}`}>
              {l}
            </button>
          ))}
        </div>
        <div className="space-y-3 mb-4">
          <div><Label>최대 심박수 HRmax (bpm)</Label><Input value={hrMax} onChange={setHrMax} placeholder="예: 185" min="100" max="230" /></div>
          {model === "karvonen" && (
            <div><Label>안정시 심박수 HRrest (bpm)</Label><Input value={hrRest} onChange={setHrRest} placeholder="예: 55" min="30" max="100" /></div>
          )}
        </div>
        <CalcBtn onClick={calculate}>심박존 계산</CalcBtn>
        {result && (
          <div className="mt-4 space-y-1">
            <p className="text-xs text-gray-400 mb-2">{sport==="run"?"달리기 — 표준 HRmax% 기준":"사이클 — 달리기 대비 5% 보정 (종목별 생리학적 차이 반영)"} · {model==="karvonen"?"Karvonen HRR":"HRmax %"}</p>
            {result.map((r,i) => <ZoneRow key={i} zone={r.zone} range={`${r.lo} – ${r.hi} bpm`} colorClass={r.color} intensity={r.label} />)}
          </div>
        )}
      </Card>
    </div>
  );
}

// ============================================================
// 3. FTP 존 계산기
// ============================================================
function FTPZone({ onBack }) {
  const LSKEY = "calc_ftp_";
  const saved = LS.get(LSKEY);
  const [ftp, setFtp] = useState(saved.ftp ?? "");
  const [result, setResult] = useState(null);
  useEffect(() => { LS.set(LSKEY, { ftp }); }, [ftp]);

  const ZONES_DEF = [
    { zone:"Zone 1", lo:0,    hi:0.54, label:"Recovery" },
    { zone:"Zone 2", lo:0.55, hi:0.75, label:"Endurance" },
    { zone:"Zone 3", lo:0.76, hi:0.90, label:"Tempo" },
    { zone:"SST",    lo:0.88, hi:0.93, label:"Sweet Spot" },
    { zone:"Zone 4", lo:0.91, hi:1.05, label:"Threshold" },
    { zone:"Zone 5", lo:1.06, hi:1.20, label:"VO₂max" },
    { zone:"Race — Standard",     lo:0.85, hi:0.95, label:"85% – 95%" },
    { zone:"Race — Half Ironman", lo:0.75, hi:0.85, label:"75% – 85%" },
    { zone:"Race — Full Ironman", lo:0.65, hi:0.80, label:"65% – 80%" },
  ];

  const calculate = () => {
    const w = parseInt(ftp);
    if (!w || w < 50 || w > 600) { alert("FTP를 올바르게 입력하세요 (50~600W)"); return; }
    setResult(ZONES_DEF.map((z,i) => ({ ...z, loW:Math.round(w*z.lo), hiW:Math.round(w*z.hi), color:ZONE_COLORS[Math.min(i,ZONE_COLORS.length-1)] })));
  };

  return (
    <div><BackBtn onBack={onBack} />
      <Card>
        <SectionTitle emoji="🚴⚡" title="FTP존 계산기" color="text-emerald-700" />
        <Desc>{`사이클 FTP(기능적 역치 파워)를 기준으로 훈련 파워존을 계산합니다.\n※ FTP란 1시간 동안 유지할 수 있는 최대 평균 파워(W)입니다.`}</Desc>
        <div className="mb-4"><Label>FTP (Functional Threshold Power, W)</Label><Input value={ftp} onChange={setFtp} placeholder="예: 250" min="50" max="600" /></div>
        <CalcBtn onClick={calculate} color="bg-emerald-600 hover:bg-emerald-700">FTP 존 계산</CalcBtn>
        {result && (
          <div className="mt-4 space-y-1">
            <p className="text-xs text-gray-400 mb-2">FTP {ftp}W 기준 · Coggan Power Zone Model</p>
            {result.map((r,i) => <ZoneRow key={i} zone={r.zone} range={`${r.loW} – ${r.hiW} W`} colorClass={r.color} intensity={r.label} />)}
            <p className="text-xs text-gray-400 mt-2 pt-2 border-t border-gray-100">Andy Coggan의 파워존 모델 기반. FTP(1시간 최대 평균 파워) 대비 % 로 Zone 1~5 및 SST(Sweet Spot)를 산출합니다.</p>
          </div>
        )}
      </Card>
    </div>
  );
}

// ============================================================
// 4. 수분 계산기
// ============================================================
function HydrationCalc({ onBack }) {
  const LSKEY = "calc_hydration_";
  const saved = LS.get(LSKEY);
  const [weight, setWeight] = useState(saved.weight ?? "");
  const [envSlider, setEnvSlider] = useState(saved.envSlider ?? 2);
  const [intensity, setIntensity] = useState(saved.intensity ?? "endurance");
  const [timeH, setTimeH] = useState(saved.timeH ?? "");
  const [timeM, setTimeM] = useState(saved.timeM ?? "");
  const [adjust, setAdjust] = useState(saved.adjust ?? "0");
  const [result, setResult] = useState(null);
  useEffect(() => { LS.set(LSKEY, { weight, envSlider, intensity, timeH, timeM, adjust }); }, [weight, envSlider, intensity, timeH, timeM, adjust]);

  const INT_OPTIONS = [
    { value:"endurance", label:"Zone 2 — Endurance", factor:1.0 },
    { value:"tempo",     label:"Zone 3 — Tempo",     factor:1.1 },
    { value:"sst",       label:"Zone 3~4 · Sweet Spot", factor:1.1 },
    { value:"threshold", label:"Zone 4 — Threshold", factor:1.2 },
    { value:"vo2max",    label:"Zone 5 — VO₂max",    factor:1.3 },
    { value:"race_std",  label:"Race — Standard",    factor:1.15 },
    { value:"race_half", label:"Race — Half IM",     factor:1.2 },
    { value:"race_full", label:"Race — Full IM",     factor:1.1 },
  ];
  const ADJUST_OPTIONS = [20,15,10,5,0,-5,-10,-15,-20].map(v=>({value:String(v),label:`${v>0?"+":""}${v}%`}));

  const calculate = () => {
    const bw = parseFloat(weight);
    const h = (parseInt(timeH)||0) + (parseInt(timeM)||0)/60;
    if (!bw || bw < 30 || bw > 200) { alert("체중을 올바르게 입력하세요 (30~200kg)"); return; }
    if (!h || h <= 0 || h > 24) { alert("운동 시간을 올바르게 입력하세요"); return; }
    const ENV_SLIDER = [0.90, 0.95, 1.0, 1.10, 1.15];
    const envF = ENV_SLIDER[envSlider] ?? 1.0;
    const intF = INT_OPTIONS.find(i => i.value === intensity)?.factor ?? 1.0;
    const adjF = 1 + parseInt(adjust)/100;
    const total = bw * 7 * h * intF * envF * adjF;
    const perHour = Math.round(total/h);
    setResult({
      total: Math.round(total), perHour,
      overLimit: perHour > 800,
      electrolyte: perHour > 600,
      envLabel: ["저온건조 (강)","저온건조 (약)","보통","고온다습 (약)","고온다습 (강)"][envSlider],
      intLabel: INT_OPTIONS.find(i=>i.value===intensity)?.label,
      envFactor: envF, intFactor: intF,
    });
  };

  return (
    <div><BackBtn onBack={onBack} />
      <Card>
        <SectionTitle emoji="🚴💧" title="사이클 수분 계산기" color="text-sky-700" />
        <Desc>사이클 운동 중 필요한 수분 섭취량을 계산합니다. 결과는 참고치이며 실제와 다를 경우 보정 기능을 활용하세요.</Desc>
        <div className="space-y-3 mb-4">
          <div><Label>체중 (kg)</Label><Input value={weight} onChange={setWeight} placeholder="예: 70" min="30" max="200" /></div>
          <div>
            <Label>환경 보정 (Environment)</Label>
            <div className="flex items-center gap-3">
              <div className="flex flex-col items-center justify-between text-xs font-bold text-sky-500 h-28 py-1 select-none">
                <span>고온다습</span><span className="text-gray-300">·</span>
                <span className="text-gray-400 font-normal">보통</span>
                <span className="text-gray-300">·</span><span className="text-blue-400">저온건조</span>
              </div>
              <input type="range" min="0" max="4" step="1" value={envSlider}
                onChange={e => setEnvSlider(Number(e.target.value))}
                style={{ writingMode:"vertical-lr", direction:"rtl", height:"7rem", width:"2rem", cursor:"pointer", accentColor:"#0ea5e9" }} />
              <div className="flex-1 bg-sky-50 rounded-xl px-3 py-2 border border-sky-100 text-center">
                <p className="text-xs text-gray-400 mb-0.5">현재 설정</p>
                <p className="text-sm font-bold text-sky-700">
                  {["저온건조 강 (×0.90)","저온건조 약 (×0.95)","보통 (×1.0)","고온다습 약 (×1.10)","고온다습 강 (×1.15)"][envSlider]}
                </p>
              </div>
            </div>
          </div>
          <div><Label>훈련 강도</Label><Select value={intensity} onChange={setIntensity} options={INT_OPTIONS} /></div>
          <div>
            <Label>총 운동 시간</Label>
            <div className="flex items-center gap-2">
              <div className="flex-1 flex items-center gap-1">
                <input type="number" value={timeH} onChange={e=>setTimeH(e.target.value)} placeholder="0" min="0" max="24"
                  className="w-full px-2 py-2 text-sm text-center border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-sky-300" />
                <span className="text-xs text-gray-500 font-semibold">시간</span>
              </div>
              <div className="flex-1 flex items-center gap-1">
                <input type="number" value={timeM} onChange={e=>setTimeM(e.target.value)} placeholder="0" min="0" max="59"
                  className="w-full px-2 py-2 text-sm text-center border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-sky-300" />
                <span className="text-xs text-gray-500 font-semibold">분</span>
              </div>
            </div>
          </div>
          <div><Label>사용자 보정 (%)</Label><Select value={adjust} onChange={setAdjust} options={ADJUST_OPTIONS} /></div>
        </div>
        <CalcBtn onClick={calculate} color="bg-sky-600 hover:bg-sky-700">수분량 계산</CalcBtn>
        {result && (
          <div className="mt-4 space-y-3">
            {/* 800ml 초과 경고 */}
            {result.overLimit && (
              <div className="bg-red-50 border border-red-200 rounded-xl p-3 text-xs text-red-700 space-y-1">
                <p className="font-bold">⚠️ 주의 [권장 섭취량: 800ml/h]</p>
                <p>필요 수분량이 장 흡수 한계(약 800ml/h)를 초과했습니다. 장에서 시간당 흡수할 수 있는 양은 보통 800ml~1,000ml가 최대입니다.</p>
              </div>
            )}
            {/* 600ml 초과 전해질 경고 */}
            {result.electrolyte && (
              <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-700">
                <p>🧂 필수: 다량의 수분 섭취 시 저나트륨혈증 방지를 위해 반드시 전해질(나트륨)을 함께 섭취하십시오.</p>
              </div>
            )}
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-sky-50 rounded-xl p-3 text-center border border-sky-100">

function CarbCalc({ onBack }) {
  const LSKEY = "calc_carb_";
  const saved = LS.get(LSKEY);
  const [sport, setSport] = useState(saved.sport ?? "bike");
  const [weight, setWeight] = useState(saved.weight ?? "");
  const [intensity, setIntensity] = useState(saved.intensity ?? "endurance");
  const [timeH, setTimeH] = useState(saved.timeH ?? "");
  const [timeM, setTimeM] = useState(saved.timeM ?? "");
  const [adjust, setAdjust] = useState(saved.adjust ?? "0");
  const [result, setResult] = useState(null);
  useEffect(() => { LS.set(LSKEY, { sport, weight, intensity, timeH, timeM, adjust }); }, [sport, weight, intensity, timeH, timeM, adjust]);

  const INT_BIKE = [
    { value:"endurance",       label:"Zone 2 — Endurance",           lo:0.5,  hi:0.7  },
    { value:"tempo",           label:"Zone 3 — Tempo",               lo:0.7,  hi:1.0  },
    { value:"sst",             label:"Zone 3~4 · Sweet Spot",        lo:0.8,  hi:1.0  },
    { value:"threshold",       label:"Zone 4 — Threshold",           lo:1.0,  hi:1.2  },
    { value:"vo2max",          label:"Zone 5 — VO₂max",              lo:1.2,  hi:1.5  },
    { value:"race_std",        label:"Race — Standard (철인 스탠다드)",  lo:1.0,  hi:1.0  },
    { value:"race_oly",        label:"Race — Olympic Distance",          lo:0.9,  hi:1.1  },
    { value:"race_half",       label:"Race — Half IM",                lo:0.8,  hi:1.0  },
    { value:"race_full_adv",   label:"Race — Full IM (상급자)",       lo:1.0,  hi:1.0  },
    { value:"race_full_beg",   label:"Race — Full IM (일반)",         lo:0.75, hi:0.75 },
  ];
  const INT_RUN = [
    { value:"easy",           label:"Easy — 조깅",              lo:0.3,  hi:0.5  },
    { value:"endurance",      label:"Zone 2 — Endurance",       lo:0.4,  hi:0.6  },
    { value:"tempo",          label:"Zone 3 — Tempo",           lo:0.6,  hi:0.8  },
    { value:"threshold",      label:"Threshold",                 lo:0.7,  hi:1.0  },
    { value:"vo2max",         label:"VO₂max",                   lo:0.9,  hi:1.2  },
    { value:"race_10k",       label:"Race — 10km",              lo:0.8,  hi:0.8  },
    { value:"race_half",      label:"Race — 하프마라톤",         lo:0.6,  hi:0.9  },

  ];
  const ADJUST_OPTIONS = [20,15,10,5,0,-5,-10,-15,-20].map(v=>({value:String(v),label:`${v>0?"+":""}${v}%`}));
  const intOptions = sport === "bike" ? INT_BIKE : INT_RUN;

  const calculate = () => {
    const bw = parseFloat(weight);
    const h = (parseInt(timeH)||0) + (parseInt(timeM)||0)/60;
    if (!bw || bw < 30 || bw > 200) { alert("체중을 올바르게 입력하세요"); return; }
    if (!h || h <= 0) { alert("운동 시간을 올바르게 입력하세요"); return; }
    const opt = intOptions.find(o => o.value === intensity) || intOptions[0];
    const adjF = 1 + parseInt(adjust)/100;
    const avgRate = (opt.lo + opt.hi) / 2;
    const perH = Math.round(bw * avgRate * adjF);
    const total = Math.round(perH * h);
    const GEL_BASE = Math.min(perH, 60); // 에너지젤 환산은 60g 상한 기준
    const gelTotal = Math.round(GEL_BASE * h);
    const GELS = [
      { name:"SIS",         g:22 },
      { name:"GU",          g:22 },
      { name:"엔업",        g:24 },
      { name:"아미노바이탈", g:24 },
      { name:"Maurten",     g:25 },
      { name:"코오롱퍼펙트", g:25 },
      { name:"Clif Bloks(6알)", g:42 },
    ];
    setResult({
      total, perH,
      overLimit: perH > 60,
      gelTotal,
      gelBase: GEL_BASE,
      gels: GELS.map(gel => ({ ...gel, count: (gelTotal / gel.g).toFixed(1) })),
      label: opt.label, rate: `${avgRate} g/kg/h`
    });

  const handleSport = (s) => { setSport(s); setIntensity("endurance"); setResult(null); };

  return (

        <div className="flex gap-2 mb-4">
          {["bike","run"].map(s => (
            <button key={s} onClick={() => handleSport(s)}
              className={`flex-1 py-2 rounded-xl text-sm font-bold transition ${sport===s?"bg-amber-500 text-white":"bg-gray-100 text-gray-500 hover:bg-gray-200"}`}>
              {s==="bike"?"🚴 사이클":"🏃 달리기"}

          ))}
        </div>
        <div className="space-y-3 mb-4">
          <div><Label>체중 (kg)</Label><Input value={weight} onChange={setWeight} placeholder="예: 70" min="30" max="200" /></div>
          <div><Label>훈련 강도 / 레이스 모드</Label><Select value={intensity} onChange={setIntensity} options={intOptions} /></div>
          <div>

              </div>

                {(() => {

// ============================================================
// VDOT 테이블 & 유틸
// ============================================================

function riegelPace(timeSec, fromKm, toKm) { return timeSec * Math.pow(toKm/fromKm, 1.06); }
function riegelDistForTime(timeSec, fromKm, targetSec) {
  // targetSec 동안 달릴 수 있는 거리 역산: D2 = D1 × (T2/T1)^(1/1.06)
  return fromKm * Math.pow(targetSec / timeSec, 1/1.06);
}
function getRiegelPaces(timeSec, dist) {
  // 10km 환산 페이스
  const tenKSec = dist === 10 ? timeSec : timeSec * Math.pow(10 / dist, 1.06);
  const tenKPace = tenKSec / 10; // 초/km

  // Easy/Tempo: Jack Daniels 비율 기반 (10km 페이스 기준)
  const easyPace  = tenKPace * 1.25; // 10km 페이스 × 1.25 (Jack Daniels E-pace)
  const tempoPace = tenKPace * 1.08; // 10km 페이스 × 1.08 (Jack Daniels T-pace)

  // LT/VO₂max: Riegel 역산 유지
  const ltDist  = riegelDistForTime(timeSec, dist, 60 * 60);
  const vo2Dist = riegelDistForTime(timeSec, dist, 12 * 60);

  return {
    easy:  easyPace,
    tempo: tempoPace,
    lt:    60 * 60 / ltDist,
    vo2:   12 * 60 / vo2Dist,
  };
}

function RunPace({ onBack }) {
  const LSKEY = "calc_runpace_";
  const saved = LS.get(LSKEY);
  const [inputDist, setInputDist] = useState(saved.inputDist ?? "5");
  const [model, setModel] = useState(saved.model ?? "vdot");
  const [timeH, setTimeH] = useState(saved.timeH ?? "");
  const [timeM, setTimeM] = useState(saved.timeM ?? "");
  const [timeS, setTimeS] = useState(saved.timeS ?? "");
  const [result, setResult] = useState(null);
  useEffect(() => { LS.set(LSKEY, { inputDist, model, timeH, timeM, timeS }); }, [inputDist, model, timeH, timeM, timeS]);

  const calculate = () => {
    const totalSec = (parseInt(timeH)||0)*3600 + (parseInt(timeM)||0)*60 + (parseInt(timeS)||0);
    const dist = parseFloat(inputDist);
    if (!totalSec || totalSec < 60) { alert("기록을 올바르게 입력하세요"); return; }
    const p = getRiegelPaces(totalSec, dist);
    const hmSec = riegelPace(totalSec, dist, 21.0975);
    const fmSec = riegelPace(totalSec, dist, 42.195);
    setResult([
      { label:"Easy/조깅",      pace:secToMMSS(p.easy),  note:"회복 / Zone 1~2 · 10km 페이스 × 1.25 (Jack Daniels E-pace)" },
      { label:"Tempo",          pace:secToMMSS(p.tempo), note:"역치 직전 / Zone 3 · 10km 페이스 × 1.08 (Jack Daniels T-pace)" },
      { label:"LT (역치)",      pace:secToMMSS(p.lt),    note:"젖산역치 / Zone 4 · Riegel 60분 역산" },
      { label:"VO₂max",        pace:secToMMSS(p.vo2),   note:"최대산소섭취 / Zone 5 · Riegel 12분 역산" },
      { label:"하프마라톤 예상", pace:secToHMMSS(hmSec), subPace:secToMMSS(hmSec/21.0975), note:"21.0975km" },
      { label:"풀마라톤 예상",   pace:secToHMMSS(fmSec), subPace:secToMMSS(fmSec/42.195),  note:"42.195km" },
    ]);
  };

  return (
    <div><BackBtn onBack={onBack} />
      <Card>
        <SectionTitle emoji="🏃⏱️" title="훈련 페이스 계산기" color="text-orange-700" />
        <Desc>5km 또는 10km 기록을 입력하면 목적별 훈련 페이스와 레이스 예상 기록을 계산합니다.</Desc>
        <div className="mb-4">
          <Label>기록 입력</Label>
          <div className="flex items-center gap-2 mb-2">
            {[["5","5km"],["10","10km"]].map(([v,l]) => (
              <button key={v} onClick={() => setInputDist(v)}
                className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-bold transition border-2 ${inputDist===v?"border-orange-500 bg-orange-50 text-orange-700":"border-gray-200 bg-gray-50 text-gray-400"}`}>
                <span className={`w-3 h-3 rounded-full border-2 flex-shrink-0 ${inputDist===v?"border-orange-500 bg-orange-500":"border-gray-300"}`}></span>
                {l}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-2">
            <div className="flex-1 flex items-center gap-1">
              <input type="number" value={timeH} onChange={e=>setTimeH(e.target.value)} placeholder="0" min="0" max="9"
                className="w-full px-2 py-2 text-sm text-center border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-orange-300" />
              <span className="text-xs text-gray-500 font-semibold">시</span>
            </div>
            <div className="flex-1 flex items-center gap-1">
              <input type="number" value={timeM} onChange={e=>setTimeM(e.target.value)} placeholder="0" min="0" max="59"
                className="w-full px-2 py-2 text-sm text-center border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-orange-300" />
              <span className="text-xs text-gray-500 font-semibold">분</span>
            </div>
            <div className="flex-1 flex items-center gap-1">
              <input type="number" value={timeS} onChange={e=>setTimeS(e.target.value)} placeholder="0" min="0" max="59"
                className="w-full px-2 py-2 text-sm text-center border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-orange-300" />
              <span className="text-xs text-gray-500 font-semibold">초</span>
            </div>
          </div>
        </div>
        {(() => {
          const totalSec = (parseInt(timeH)||0)*3600 + (parseInt(timeM)||0)*60 + (parseInt(timeS)||0);
          const dist = parseFloat(inputDist);
          if (!totalSec || !dist) return null;
          const paceSec = totalSec / dist;
          return (
            <div className="mb-3 bg-orange-50 border border-orange-100 rounded-xl px-3 py-2 flex items-center justify-between">
              <span className="text-xs text-gray-500">{dist}km 기준 1km 페이스</span>
              <span className="text-sm font-black font-mono text-orange-700">{secToMMSS(paceSec)}/km</span>
            </div>
          );
        })()}
        <CalcBtn onClick={calculate} color="bg-orange-600 hover:bg-orange-700">훈련 페이스 계산</CalcBtn>
        {result && (
          <div className="mt-4 space-y-1">
            {result.map((r,i) => (
              <div key={i} className="flex items-center justify-between py-1.5 border-b border-gray-50">
                <span className="text-sm font-semibold text-gray-800">{r.label}</span>
                <div className="flex items-center gap-2">
                  {r.subPace && <span className="text-xs text-gray-400 font-mono">({r.subPace}/km)</span>}
                  <span className="text-base font-black font-mono text-orange-700">{r.pace}</span>
                </div>
              </div>
            ))}
            <div className="mt-3 bg-orange-50 border border-orange-100 rounded-xl p-3 space-y-1.5">
              <p className="text-xs font-bold text-orange-700 mb-1">📋 산출기준</p>
              {result.map((r,i) => r.note && (
                <p key={i} className="text-xs text-gray-500"><span className="font-semibold text-gray-600">{r.label}:</span> {r.note}</p>
              ))}
            </div>
          </div>
        )}
      </Card>
    </div>
  );
}

function IntervalCalc({ onBack }) {
  const LSKEY = "calc_interval_";
  const saved = LS.get(LSKEY);
  const [inputDist, setInputDist] = useState(saved.inputDist ?? "10");
  const [timeH, setTimeH] = useState(saved.timeH ?? "");
  const [timeM, setTimeM] = useState(saved.timeM ?? "");
  const [timeS, setTimeS] = useState(saved.timeS ?? "");
  const [repDist, setRepDist] = useState(saved.repDist ?? "400");
  const [recMode, setRecMode] = useState(saved.recMode ?? "time");   // time | dist
  const [recRatio, setRecRatio] = useState(saved.recRatio ?? "0.5"); // 0.5 | 1.0
  const [result, setResult] = useState(null);
  useEffect(() => { LS.set(LSKEY, { inputDist, timeH, timeM, timeS, repDist, recMode, recRatio }); }, [inputDist, timeH, timeM, timeS, repDist, recMode, recRatio]);

  const REP_DISTS = [400,600,800,1000,1200,1600].map(d=>({value:String(d),label:`${d}m`}));

  const getSets = (tenKSec) => {
    if (tenKSec < 35*60) return "15~20세트";
    if (tenKSec < 40*60) return "12~15세트";
    if (tenKSec < 45*60) return "10~12세트";
    if (tenKSec < 50*60) return "8~10세트";
    if (tenKSec < 60*60) return "6~8세트";
    return "5~6세트";
  };

  const calculate = () => {
    const totalSec = (parseInt(timeH)||0)*3600 + (parseInt(timeM)||0)*60 + (parseInt(timeS)||0);
    const dist = parseFloat(inputDist);
    // 방어 로직: 5km 10분~60분, 10km 20분~120분
    const minSec = dist === 5 ? 10*60 : 20*60;
    const maxSec = dist === 5 ? 60*60 : 120*60;
    if (!totalSec || totalSec < minSec || totalSec > maxSec) {
      alert("기록을 다시 확인해주세요"); return;
    }

    const tenKSec = dist === 10 ? totalSec : riegelPace(totalSec, dist, 10);
    const tenKPaceSec = tenKSec / 10;
    const intervalPaceSec = tenKPaceSec - 20;
    const repDistKm = parseInt(repDist) / 1000;
    const repTimeSec = Math.round(intervalPaceSec * repDistKm);

    // 회복 계산
    let recDistM, recTimeSec, recPaceSec, recLabel;
    if (recMode === "time") {
      // 시간 기준: 질주시간과 동일 (1:1)
      recTimeSec = repTimeSec;
      recDistM = null;
      recPaceSec = null;
      recLabel = "시간 기준";
    } else {
      // 거리 기준: recRatio(0.5=절반, 1.0=동일) 적용
      const ratio = parseFloat(recRatio);
      recDistM   = Math.round(parseInt(repDist) * ratio);       // 거리 = 반복거리 × ratio
      recTimeSec = Math.round(repTimeSec * ratio * 2);          // 시간 = 절반거리 기준(86초) × ratio × 2
      recPaceSec = recTimeSec / (recDistM / 1000);              // 페이스 = 시간 / 거리(km)
      recLabel   = `거리 기준`;
    }

    setResult({
      tenKTime: secToMMSS(tenKSec/10) + "/km",
      tenKRecord: (() => { const m=Math.floor(tenKSec/60); const s=Math.round(tenKSec%60); return `${m}:${s<10?"0":""}${s}`; })(),
      sets: getSets(tenKSec),
      intervalPace: secToMMSS(intervalPaceSec),
      repDist: parseInt(repDist),
      repTime: secToMMSS(repTimeSec),
      repTimeSec: Math.round(repTimeSec),
      recDistM, recTimeSec: Math.round(recTimeSec),
      recTime: secToMMSS(recTimeSec),
      recPace: recPaceSec ? secToMMSS(recPaceSec) : null,
      recLabel, recMode,
    });
  };

  return (
    <div><BackBtn onBack={onBack} />
      <Card>
        <SectionTitle emoji="🏃🔥" title="VO₂max 인터벌 계산기" color="text-orange-700" />
        <Desc>5km 또는 10km 기록을 입력하면 VO₂max 향상을 위한 인터벌 페이스와 권장 세트 수를 계산합니다.</Desc>
        <div className="space-y-3 mb-4">
          <div>
            <Label>기록 입력</Label>
            <div className="flex items-center gap-2 mb-2">
              {[["5","5km"],["10","10km"]].map(([v,l]) => (
                <button key={v} onClick={() => setInputDist(v)}
                  className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-bold transition border-2 ${inputDist===v?"border-orange-500 bg-orange-50 text-orange-700":"border-gray-200 bg-gray-50 text-gray-400"}`}>
                  <span className={`w-3 h-3 rounded-full border-2 flex-shrink-0 ${inputDist===v?"border-orange-500 bg-orange-500":"border-gray-300"}`}></span>
                  {l}
                </button>
              ))}
            </div>
            <div className="flex items-center gap-2">
              <div className="flex-1 flex items-center gap-1">
                <input type="number" value={timeH} onChange={e=>setTimeH(e.target.value)} placeholder="0" min="0" max="9"
                  className="w-full px-2 py-2 text-sm text-center border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-orange-300" />
                <span className="text-xs text-gray-500 font-semibold">시</span>
              </div>
              <div className="flex-1 flex items-center gap-1">
                <input type="number" value={timeM} onChange={e=>setTimeM(e.target.value)} placeholder="0" min="0" max="59"
                  className="w-full px-2 py-2 text-sm text-center border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-orange-300" />
                <span className="text-xs text-gray-500 font-semibold">분</span>
              </div>
              <div className="flex-1 flex items-center gap-1">
                <input type="number" value={timeS} onChange={e=>setTimeS(e.target.value)} placeholder="0" min="0" max="59"
                  className="w-full px-2 py-2 text-sm text-center border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-orange-300" />
                <span className="text-xs text-gray-500 font-semibold">초</span>
              </div>
            </div>
          </div>
          <div><Label>인터벌 반복 거리</Label><Select value={repDist} onChange={setRepDist} options={REP_DISTS} /></div>
          {/* 회복 모드 선택 */}
          <div>
            <Label>회복 방식</Label>
            <div className="flex gap-2">
              {[["time","시간 기준"],["dist","거리 기준"]].map(([v,l]) => (
                <button key={v} onClick={() => setRecMode(v)}
                  className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-bold transition border-2 ${recMode===v?"border-orange-500 bg-orange-50 text-orange-700":"border-gray-200 bg-gray-50 text-gray-400"}`}>
                  <span className={`w-3 h-3 rounded-full border-2 flex-shrink-0 ${recMode===v?"border-orange-500 bg-orange-500":"border-gray-300"}`}></span>
                  {l}
                </button>
              ))}
            </div>
            {recMode === "dist" && (
              <div className="flex gap-2 mt-2">
                {[["0.5","절반 거리 (0.5:1)"],["1.0","동일 거리 (1:1)"]].map(([v,l]) => (
                  <button key={v} onClick={() => setRecRatio(v)}
                    className={`flex-1 py-1.5 rounded-xl text-xs font-bold transition border-2 ${recRatio===v?"border-orange-500 bg-orange-50 text-orange-700":"border-gray-200 bg-gray-50 text-gray-400"}`}>
                    {l}
                  </button>
                ))}
              </div>
            )}
            {recMode === "dist" && (
              <div className="bg-orange-50 rounded-xl p-3 text-xs text-orange-700 border border-orange-100 mt-2 space-y-1">
                <p>⚡ <span className="font-bold">절반 거리 (0.5:1)</span>: 심폐 한계치(VO₂max) 강화에 집중하는 고강도 설정입니다.</p>
                <p>🔄 <span className="font-bold">동일 거리 (1:1)</span>: 페이스 리듬 숙달과 자세 유지(러닝 이코노미)에 집중하는 설정입니다.</p>
              </div>
            )}
          </div>
        </div>
        <CalcBtn onClick={calculate} color="bg-orange-600 hover:bg-orange-700">인터벌 페이스 계산</CalcBtn>
        {result && (
          <div className="mt-4 space-y-2">
            {/* 기록 요약 */}
            <div className="bg-gray-50 rounded-xl px-4 py-3 text-sm text-gray-600 flex justify-between items-center">
              <span>10km 기록 <span className="font-bold text-gray-800">{result.tenKRecord}</span></span>
              <span>페이스 <span className="font-bold text-gray-800">{result.tenKTime}</span></span>
            </div>
            {/* 세트 */}
            <div className="bg-orange-50 rounded-xl px-4 py-3 border border-orange-100 flex justify-between items-center">
              <span className="text-sm text-orange-600 font-semibold">권장 세트</span>
              <span className="text-lg font-black text-orange-800">{result.sets}</span>
            </div>
            {/* 인터벌 */}
            <div className="bg-orange-600 rounded-xl px-4 py-3 text-white">
              <div className="flex justify-between items-center mb-1">
                <span className="text-xs opacity-75 font-semibold">인터벌 {result.repDist}m</span>
                <span className="text-xs opacity-75">페이스 {result.intervalPace}/km</span>
              </div>
              <div className="flex justify-between items-end">
                <span className="text-2xl font-black">{result.repTime}</span>
                <span className="text-sm opacity-90">({result.repTimeSec}초)</span>
              </div>
            </div>
            {/* 회복 */}
            <div className="bg-gray-100 rounded-xl px-4 py-3">
              <div className="flex justify-between items-center mb-1">
                <span className="text-xs text-gray-500 font-semibold">
                  회복 ({result.recLabel}){result.recDistM ? ` ${result.recDistM}m` : ""}
                </span>
                {result.recPace && <span className="text-xs text-gray-500">페이스 {result.recPace}/km</span>}
              </div>
              <div className="flex justify-between items-end">
                <span className="text-2xl font-black text-gray-700">{result.recTime}</span>
                <span className="text-sm text-gray-500">({result.recTimeSec}초)</span>
              </div>
            </div>
            {/* 산출기준 */}
            <div className="bg-gray-50 rounded-xl p-3 text-xs text-gray-400 space-y-0.5">
              <p>📊 인터벌 페이스: 10km 페이스 − 20초/km (Jack Daniels I-Pace)</p>
              <p>🔄 회복: {result.recMode==="time"?"질주시간과 동일 · 1:1 법칙":"거리 기준 · "+recRatio+":1 비율"} (ACSM)</p>
              <p>📋 세트 수: 주간거리 추정 × 8% 기준 (ACSM)</p>
            </div>
          </div>
        )}
      </Card>
    </div>
  );
}
